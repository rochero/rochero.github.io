# ---------------- #
#   Main Configs   #
# ---------------- #
baseurl:
url: https://rochero.github.io
date_format: "ordinal"
title: 编码人生
subtitle: "无他，唯手熟尔"
description: "Rocher's blogs"
keywords: 博客, Rocher Zhang
timezone: Asia/Beijing
encoding: "utf-8"

# ---------------- #
#      Author      #
# ---------------- #
author: Rocher Zhang
organization: HBU
organization_url: http://www.hbu.edu.cn
github_username: rochero
location: Baoding, China
email: rochero@163.com

# ---------------- #
#    Navigation    #
# ---------------- #
navs:
  -
    href: /
    label: 首页

  -
    href: /categories/
    label: 分类

#   -
#     href: /archives/
#     label: 归档

  -
    href: /wiki/
    label: 维基

  -
    href: /links/
    label: 下载

  -
    href: /about/
    label: 关于

# ---------------- #
#      Jekyll      #
# ---------------- #
markdown: kramdown
kramdown:
    input: GFM
highlighter: rouge
paginate: 8
lsi: false
quiet: false
excerpt_separator: "\n\n"
permalink: /:year/:month/:day/:title/
gems:
    - jekyll-github-metadata
    - rouge
#     - jekyll-html-pipeline
    - jekyll-paginate
    - jekyll-sitemap
    - jekyll-feed
    - jemoji
#     - jekyll-mentions
collections:
    wiki:
        output: true
        permalink: /wiki/:path/

repository: rochero/rochero.github.io

# ---------------- #
#      Search      #
# ---------------- #
simple_jekyll_search:
    # 是否支持全文搜索
    fulltext: false
    # 最多显示多少条搜索结果
    limit: 10
